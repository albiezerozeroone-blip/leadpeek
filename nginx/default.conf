upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml image/svg+xml font/woff2;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Hide server version
server_tokens off;

# HTTP -> HTTPS redirect (all domains -> datasnoop.be)
server {
    listen 80;
    server_name datasnoop.be www.datasnoop.be datasnoop.eu www.datasnoop.eu datapeak.invm.be;
    return 301 https://datasnoop.be$request_uri;
}

# Fallback for IP access
server {
    listen 80 default_server;
    server_name _;
    return 301 https://datasnoop.be$request_uri;
}

# Redirect www / .eu / old domain to canonical datasnoop.be
server {
    listen 443 ssl http2;
    server_name www.datasnoop.be datasnoop.eu www.datasnoop.eu;

    ssl_certificate /etc/letsencrypt/live/datasnoop.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datasnoop.be/privkey.pem;

    return 301 https://datasnoop.be$request_uri;
}

# Old domain redirect
server {
    listen 443 ssl http2;
    server_name datapeak.invm.be;

    ssl_certificate /etc/letsencrypt/live/datapeak.invm.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datapeak.invm.be/privkey.pem;

    return 301 https://datasnoop.be$request_uri;
}

# Primary HTTPS server
server {
    listen 443 ssl http2;
    server_name datasnoop.be;

    ssl_certificate /etc/letsencrypt/live/datasnoop.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datasnoop.be/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    # Cache static assets
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Clean URL for standalone vote page
    location = /vote {
        rewrite ^ /vote.html last;
    }

    # API -> FastAPI
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
