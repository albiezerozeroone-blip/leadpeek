<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help us pick a logo — Datasnoop</title>
  <meta name="description" content="Vote for your favourite Datasnoop logo design." />
  <meta property="og:title" content="Help us pick our logo — Datasnoop" />
  <meta property="og:description" content="We're choosing a logo for Datasnoop, the Belgian company intelligence platform. Cast your vote!" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      width: 100%;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 3rem; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 1rem;
      letter-spacing: 0.02em;
    }
    .badge svg { width: 15px; height: 15px; }

    .header h1 {
      font-size: clamp(1.7rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .header .subtitle {
      font-size: 1.05rem;
      color: #64748b;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; }
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #e2e8f0;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      cursor: pointer;
      position: relative;
    }
    .card:hover:not(.voted):not(.disabled) {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      border-color: #a5b4fc;
    }
    .card.chosen {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px #c7d2fe;
    }
    .card.voted:not(.chosen) { opacity: 0.6; }
    .card.disabled { cursor: default; }

    .card-logo {
      padding: 1.5rem 1rem;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #f1f5f9;
    }
    .card-logo img { width: 100%; height: auto; display: block; }

    .card-body { padding: 1.25rem 1.5rem 1.5rem; }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
    }

    .your-vote {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #4f46e5;
      background: #eef2ff;
      padding: 2px 10px;
      border-radius: 999px;
    }
    .your-vote svg { width: 11px; height: 11px; }

    .card-desc {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    /* Vote button */
    .vote-btn {
      width: 100%;
      padding: 12px 0;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: #334155;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .vote-btn:hover {
      background: #eef2ff;
      border-color: #a5b4fc;
      color: #4338ca;
    }
    .vote-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Result bar */
    .result { margin-top: 0; }
    .result-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
    .result-pct { font-weight: 700; color: #1e293b; }
    .result-count { color: #94a3b8; }

    .bar-track {
      width: 100%;
      height: 12px;
      background: #f1f5f9;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      min-width: 0;
    }
    .bar-fill.primary { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .bar-fill.muted { background: #cbd5e1; }

    /* Footer */
    .foot {
      text-align: center;
      padding: 2rem 1rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }
    .foot a { color: #6366f1; text-decoration: none; }
    .foot a:hover { text-decoration: underline; }

    .thanks {
      text-align: center;
      margin-top: 2.5rem;
      color: #94a3b8;
      font-size: 0.85rem;
    }

    /* Loading */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    /* Confetti-like success animation */
    @keyframes pop-in {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: pop-in 0.35s ease-out; }
  </style>
</head>
<body>

<div class="page" id="app">
  <div class="loader" id="loading">Loading poll...</div>
</div>

<div class="foot">
  <a href="/">Datasnoop</a> — Belgian Company Intelligence
</div>

<script>
(function () {
  const API = '';
  const STORAGE_KEY = 'datasnoop_logo_vote';
  const app = document.getElementById('app');

  const LOGOS = {
    Magnifier: {
      file: '/logos/datasnoop-logo-1-magnifier.svg',
      label: 'Snoop Dog',
      desc: 'A curious pup with a magnifying glass, always on the hunt for data'
    },
    Eye: {
      file: '/logos/datasnoop-logo-2-eye.svg',
      label: 'The Detective',
      desc: 'A winking sleuth in a fedora — knows all your company secrets'
    },
    Radar: {
      file: '/logos/datasnoop-logo-3-radar.svg',
      label: 'Data Peeker',
      desc: 'Caught snooping on the numbers! Big eyes peeking over the charts'
    }
  };

  let state = { poll: null, results: null, voted: null, submitting: false };

  function render() {
    const { poll, results, voted } = state;
    if (!poll) return;

    const totalVotes = results ? results.total_votes : 0;

    let html = `
      <div class="header">
        <div class="badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m18 13 3-3-3-3"/><path d="M6 11l-3 3 3 3"/>
            <path d="m3 14 7-7"/><path d="m14 17 7-7"/>
          </svg>
          ${poll.title}
        </div>
        <h1>${poll.question}</h1>
        <p class="subtitle">${voted
          ? totalVotes + ' vote' + (totalVotes === 1 ? '' : 's') + ' so far'
          : 'Click on your favourite to vote'
        }</p>
      </div>
      <div class="grid">
    `;

    for (const [key, logo] of Object.entries(LOGOS)) {
      const isChosen = voted === key;
      const pct = results && totalVotes > 0
        ? Math.round(((results.votes[key] || 0) / totalVotes) * 100)
        : 0;
      const count = results ? (results.votes[key] || 0) : 0;

      const classes = [
        'card',
        voted ? 'voted disabled' : '',
        isChosen ? 'chosen' : ''
      ].filter(Boolean).join(' ');

      html += `
        <div class="${classes}" data-key="${key}" ${!voted ? 'onclick="vote(\'' + key + '\')"' : ''}>
          <div class="card-logo">
            <img src="${logo.file}" alt="${logo.label}" />
          </div>
          <div class="card-body">
            <div class="card-title-row">
              <span class="card-title">${logo.label}</span>
              ${isChosen ? `
                <span class="your-vote">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Your vote
                </span>
              ` : ''}
            </div>
            <p class="card-desc">${logo.desc}</p>
            ${voted && results ? `
              <div class="result pop">
                <div class="result-header">
                  <span class="result-pct">${pct}%</span>
                  <span class="result-count">${count} vote${count === 1 ? '' : 's'}</span>
                </div>
                <div class="bar-track">
                  <div class="bar-fill ${isChosen ? 'primary' : 'muted'}" style="width: ${pct}%"></div>
                </div>
              </div>
            ` : `
              <button class="vote-btn" onclick="event.stopPropagation(); vote('${key}')" ${state.submitting ? 'disabled' : ''}>
                ${state.submitting ? 'Voting...' : 'Vote for this logo'}
              </button>
            `}
          </div>
        </div>
      `;
    }

    html += '</div>';

    if (voted) {
      html += '<p class="thanks">Thanks for voting! Share this page so others can vote too.</p>';
    }

    app.innerHTML = html;
  }

  window.vote = async function (choice) {
    if (!state.poll || state.submitting || state.voted) return;
    state.submitting = true;
    render();

    try {
      const res = await fetch(API + '/api/polls/' + state.poll.id + '/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice })
      });

      if (!res.ok && res.status !== 409) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || 'Vote failed');
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify({ pollId: state.poll.id, choice }));
      state.voted = choice;

      const rr = await fetch(API + '/api/polls/' + state.poll.id + '/results');
      if (rr.ok) state.results = await rr.json();
    } catch (e) {
      console.error(e);
    }

    state.submitting = false;
    render();
  };

  async function init() {
    // Check if already voted
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && saved.pollId) {
        state.voted = saved.choice;
        const res = await fetch(API + '/api/polls/' + saved.pollId + '/results');
        if (res.ok) {
          const data = await res.json();
          state.poll = data;
          state.results = data;
          render();
          return;
        }
      }
    } catch {}

    // Load active poll
    try {
      const res = await fetch(API + '/api/polls/active');
      const data = await res.json();
      if (data && data.id) {
        state.poll = data;
        render();
      } else {
        app.innerHTML = '<div class="loader">No active poll right now. Check back soon!</div>';
      }
    } catch {
      app.innerHTML = '<div class="loader">Could not load poll. Please try again later.</div>';
    }
  }

  init();
})();
</script>
</body>
</html>
