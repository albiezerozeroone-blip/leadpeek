<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick our mascot — Datasnoop</title>
  <meta name="description" content="Vote for your favourite Datasnoop mascot." />
  <meta property="og:title" content="Pick our mascot — Datasnoop" />
  <meta property="og:description" content="Help us choose a mascot for Datasnoop. 20 dogs, one winner!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
    .page{flex:1;max-width:900px;margin:0 auto;padding:2.5rem 1.25rem 3rem;width:100%}
    .header{text-align:center;margin-bottom:2rem}
    .badge{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;color:#4f46e5;font-size:.78rem;font-weight:600;padding:5px 14px;border-radius:999px;margin-bottom:.75rem;letter-spacing:.02em}
    .header h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.2;margin-bottom:.4rem}
    .header .sub{font-size:.95rem;color:#64748b}

    .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
    @media(max-width:720px){.grid{grid-template-columns:repeat(3,1fr);gap:.75rem}}
    @media(max-width:440px){.grid{grid-template-columns:repeat(2,1fr);gap:.6rem}}

    .card{background:#fff;border-radius:14px;border:2px solid #e2e8f0;padding:.75rem .75rem .6rem;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s}
    .card:hover:not(.voted):not(.disabled){transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.07);border-color:#a5b4fc}
    .card.chosen{border-color:#6366f1;box-shadow:0 0 0 3px #c7d2fe}
    .card.voted:not(.chosen){opacity:.5}
    .card.disabled{cursor:default}
    .card .icon{position:relative;width:80px;height:80px;margin:0 auto .4rem}
    .card .icon .glass{position:absolute;bottom:0;right:0;width:52px;height:52px;opacity:.85}
    .card .icon img{position:absolute;top:0;left:0;width:56px;height:56px}
    .card .name{font-size:.78rem;font-weight:600;color:#334155;margin-bottom:.3rem}
    .card .tag{display:none;font-size:.6rem;font-weight:600;color:#4f46e5;background:#eef2ff;padding:1px 8px;border-radius:999px;margin:0 auto}
    .card.chosen .tag{display:inline-block}

    /* Result bar inside card */
    .card .res{margin-top:.35rem}
    .card .res-pct{font-size:.7rem;font-weight:700;color:#1e293b}
    .card .res-count{font-size:.6rem;color:#94a3b8;margin-left:4px}
    .bar{width:100%;height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-top:3px}
    .bar div{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.22,1,.36,1)}
    .bar .p{background:linear-gradient(90deg,#6366f1,#818cf8)}
    .bar .m{background:#cbd5e1}

    .thanks{text-align:center;margin-top:1.5rem;color:#94a3b8;font-size:.82rem}
    .foot{text-align:center;padding:1.5rem 1rem;color:#94a3b8;font-size:.8rem}
    .foot a{color:#6366f1;text-decoration:none}
    .foot a:hover{text-decoration:underline}
    .loader{display:flex;align-items:center;justify-content:center;min-height:40vh;color:#94a3b8;font-size:.9rem}
    @keyframes pop{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
    .pop{animation:pop .3s ease-out}
  </style>
</head>
<body>
<div class="page" id="app"><div class="loader">Loading poll...</div></div>
<div class="foot"><a href="/">Datasnoop</a> — Belgian Company Intelligence</div>
<script>
(function(){
  var API='', KEY='datasnoop_dog_vote', app=document.getElementById('app');

  var DOGS=[
    {id:'Golden',      file:'/logos/dogs/01-golden.svg',     name:'Golden Retriever'},
    {id:'Beagle',      file:'/logos/dogs/02-beagle.svg',     name:'Beagle'},
    {id:'Shiba',       file:'/logos/dogs/03-shiba.svg',      name:'Shiba Inu'},
    {id:'Husky',       file:'/logos/dogs/04-husky.svg',      name:'Husky'},
    {id:'Pug',         file:'/logos/dogs/05-pug.svg',        name:'Pug'},
    {id:'Corgi',       file:'/logos/dogs/06-corgi.svg',      name:'Corgi'},
    {id:'Frenchie',    file:'/logos/dogs/07-frenchie.svg',   name:'French Bulldog'},
    {id:'Dalmatian',   file:'/logos/dogs/08-dalmatian.svg',  name:'Dalmatian'},
    {id:'Shepherd',    file:'/logos/dogs/09-shepherd.svg',   name:'German Shepherd'},
    {id:'Labrador',    file:'/logos/dogs/10-labrador.svg',   name:'Chocolate Lab'},
    {id:'Bloodhound',  file:'/logos/dogs/11-bloodhound.svg', name:'Bloodhound'},
    {id:'Poodle',      file:'/logos/dogs/12-poodle.svg',     name:'Poodle'},
    {id:'Collie',      file:'/logos/dogs/13-collie.svg',     name:'Border Collie'},
    {id:'Dachshund',   file:'/logos/dogs/14-dachshund.svg',  name:'Dachshund'},
    {id:'Chihuahua',   file:'/logos/dogs/15-chihuahua.svg',  name:'Chihuahua'},
    {id:'Samoyed',     file:'/logos/dogs/16-samoyed.svg',    name:'Samoyed'},
    {id:'Scottie',     file:'/logos/dogs/17-scottie.svg',    name:'Scottie'},
    {id:'JackRussell', file:'/logos/dogs/18-jackrussell.svg',name:'Jack Russell'},
    {id:'Bulldog',     file:'/logos/dogs/19-bulldog.svg',    name:'English Bulldog'},
    {id:'Kawaii',      file:'/logos/dogs/20-kawaii.svg',      name:'Kawaii'}
  ];

  var state={poll:null,results:null,voted:null,submitting:false};

  function render(){
    var poll=state.poll,results=state.results,voted=state.voted;
    if(!poll) return;
    var total=results?results.total_votes:0;
    var h='<div class="header"><div class="badge">'+poll.title+'</div>';
    h+='<h1>'+poll.question+'</h1>';
    h+='<p class="sub">'+(voted?total+' vote'+(total===1?'':'s')+' so far':'Tap your favourite dog')+'</p></div>';
    h+='<div class="grid">';
    for(var i=0;i<DOGS.length;i++){
      var d=DOGS[i],chosen=voted===d.id;
      var pct=results&&total>0?Math.round(((results.votes[d.id]||0)/total)*100):0;
      var cnt=results?(results.votes[d.id]||0):0;
      var cls='card'+(voted?' voted disabled':'')+(chosen?' chosen':'');
      h+='<div class="'+cls+'" '+(voted?'':'onclick="vote(\''+d.id+'\')"')+'>';
      h+='<div class="icon"><img src="'+d.file+'" alt="'+d.name+'"><svg class="glass" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="22" cy="22" r="19" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3.5"/><line x1="36" y1="36" x2="48" y2="48" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/><path d="M13 16 Q16 12 21 14" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity=".5"/></svg></div>';
      h+='<div class="name">'+d.name+'</div>';
      if(chosen) h+='<div class="tag">Your pick</div>';
      if(voted&&results){
        h+='<div class="res pop"><span class="res-pct">'+pct+'%</span><span class="res-count">'+cnt+'</span>';
        h+='<div class="bar"><div class="'+(chosen?'p':'m')+'" style="width:'+pct+'%"></div></div></div>';
      }
      h+='</div>';
    }
    h+='</div>';
    if(voted) h+='<p class="thanks">Thanks! Share this page so others can vote too.</p>';
    app.innerHTML=h;
  }

  window.vote=async function(choice){
    if(!state.poll||state.submitting||state.voted) return;
    state.submitting=true;render();
    try{
      var r=await fetch(API+'/api/polls/'+state.poll.id+'/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({choice:choice})});
      if(!r.ok&&r.status!==409){var d=await r.json().catch(function(){return{}});throw new Error(d.detail||'fail')}
      localStorage.setItem(KEY,JSON.stringify({pollId:state.poll.id,choice:choice}));
      state.voted=choice;
      var rr=await fetch(API+'/api/polls/'+state.poll.id+'/results');
      if(rr.ok) state.results=await rr.json();
    }catch(e){console.error(e)}
    state.submitting=false;render();
  };

  (async function(){
    try{
      var s=JSON.parse(localStorage.getItem(KEY));
      if(s&&s.pollId){
        state.voted=s.choice;
        var r=await fetch(API+'/api/polls/'+s.pollId+'/results');
        if(r.ok){var d=await r.json();state.poll=d;state.results=d;render();return}
      }
    }catch(e){}
    try{
      var r=await fetch(API+'/api/polls/active');var d=await r.json();
      if(d&&d.id){state.poll=d;render()}
      else app.innerHTML='<div class="loader">No active poll right now.</div>';
    }catch(e){app.innerHTML='<div class="loader">Could not load poll.</div>'}
  })();
})();
</script>
</body>
</html>
