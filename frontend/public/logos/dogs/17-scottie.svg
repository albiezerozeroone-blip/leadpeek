<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Scottish Terrier — boxy, proud, beard -->
  <rect x="14" y="24" width="52" height="40" rx="10" fill="#1e293b"/>
  <!-- Pointy ears -->
  <polygon points="18,28 24,8 32,24" fill="#1e293b"/>
  <polygon points="62,28 56,8 48,24" fill="#1e293b"/>
  <!-- Beard/muzzle — blocky -->
  <rect x="26" y="42" width="28" height="20" rx="8" fill="#334155"/>
  <ellipse cx="40" cy="44" rx="4" ry="2.8" fill="#292524"/>
  <!-- Eyes -->
  <circle cx="30" cy="36" r="3.5" fill="white"/>
  <circle cx="50" cy="36" r="3.5" fill="white"/>
  <circle cx="31" cy="36.5" r="2" fill="#292524"/>
  <circle cx="51" cy="36.5" r="2" fill="#292524"/>
  <circle cx="31.8" cy="35.8" r="0.8" fill="white"/>
  <circle cx="51.8" cy="35.8" r="0.8" fill="white"/>
  <!-- Proud little smile -->
  <path d="M36 52 Q40 55 44 52" fill="none" stroke="#64748b" stroke-width="1.3" stroke-linecap="round"/>
</svg>