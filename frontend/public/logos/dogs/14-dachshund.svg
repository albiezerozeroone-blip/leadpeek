<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dachshund — long snout, floppy ears, sausage vibes -->
  <ellipse cx="40" cy="42" rx="26" ry="24" fill="#92400e"/>
  <!-- Round floppy ears -->
  <ellipse cx="14" cy="36" rx="10" ry="14" fill="#78350f" transform="rotate(-10 14 36)"/>
  <ellipse cx="66" cy="36" rx="10" ry="14" fill="#78350f" transform="rotate(10 66 36)"/>
  <!-- Long snout -->
  <ellipse cx="42" cy="50" rx="16" ry="10" fill="#b45309"/>
  <ellipse cx="48" cy="46" rx="5" ry="3.5" fill="#292524"/>
  <ellipse cx="46.5" cy="44.8" rx="1.8" ry="1" fill="white" opacity="0.25"/>
  <!-- Eyes — cheeky -->
  <circle cx="28" cy="34" r="4" fill="white"/>
  <circle cx="46" cy="34" r="4" fill="white"/>
  <circle cx="29.5" cy="34.5" r="2.5" fill="#292524"/>
  <circle cx="47.5" cy="34.5" r="2.5" fill="#292524"/>
  <circle cx="30.5" cy="33.5" r="1" fill="white"/>
  <circle cx="48.5" cy="33.5" r="1" fill="white"/>
  <!-- Wink -->
  <path d="M38 56 Q44 60 50 55" fill="none" stroke="#78350f" stroke-width="1.3" stroke-linecap="round"/>
