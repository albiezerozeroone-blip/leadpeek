<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Golden Retriever — round, floppy ears, big smile -->
  <circle cx="40" cy="42" r="30" fill="#f59e0b"/>
  <!-- Ears -->
  <ellipse cx="14" cy="38" rx="10" ry="16" fill="#d97706" transform="rotate(-10 14 38)"/>
  <ellipse cx="66" cy="38" rx="10" ry="16" fill="#d97706" transform="rotate(10 66 38)"/>
  <!-- Muzzle -->
  <ellipse cx="40" cy="50" rx="14" ry="10" fill="#fcd34d"/>
  <!-- Nose -->
  <ellipse cx="40" cy="46" rx="5" ry="3.5" fill="#292524"/>
  <!-- Eyes -->
  <circle cx="30" cy="36" r="4" fill="#292524"/>
  <circle cx="50" cy="36" r="4" fill="#292524"/>
  <circle cx="31.5" cy="35" r="1.5" fill="white"/>
  <circle cx="51.5" cy="35" r="1.5" fill="white"/>
  <!-- Mouth -->
  <path d="M34 54 Q40 60 46 54" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="40" cy="58" rx="4" ry="5" fill="#fb7185"/>
</svg>