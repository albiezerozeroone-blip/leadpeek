<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Shiba Inu — triangle ears, doge squint smile -->
  <circle cx="40" cy="44" r="28" fill="#f59e0b"/>
  <!-- Pointy ears -->
  <polygon points="16,34 22,8 32,30" fill="#ea580c"/>
  <polygon points="64,34 58,8 48,30" fill="#ea580c"/>
  <polygon points="19,30 22,12 29,28" fill="#fcd34d" opacity="0.5"/>
  <polygon points="61,30 58,12 51,28" fill="#fcd34d" opacity="0.5"/>
  <!-- White cheeks -->
  <ellipse cx="40" cy="52" rx="18" ry="14" fill="#fef3c7"/>
  <!-- Nose -->
  <ellipse cx="40" cy="46" rx="4" ry="3" fill="#292524"/>
  <!-- Squinty happy eyes -->
  <path d="M26 36 Q30 32 34 36" fill="none" stroke="#292524" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M46 36 Q50 32 54 36" fill="none" stroke="#292524" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M36 50 Q40 54 44 50" fill="none" stroke="#b45309" stroke-width="1.3" stroke-linecap="round"/>
</svg>