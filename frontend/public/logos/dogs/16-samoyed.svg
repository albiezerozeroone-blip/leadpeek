<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Samoyed — fluffy white cloud, permanent smile -->
  <!-- Fluffy outline -->
  <circle cx="40" cy="42" r="30" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="18" cy="30" r="10" fill="white"/>
  <circle cx="62" cy="30" r="10" fill="white"/>
  <circle cx="26" cy="20" r="9" fill="white"/>
  <circle cx="54" cy="20" r="9" fill="white"/>
  <circle cx="40" cy="16" r="8" fill="white"/>
  <!-- Small pointy ears poking out -->
  <polygon points="20,26 24,10 30,24" fill="#f1f5f9"/>
  <polygon points="60,26 56,10 50,24" fill="#f1f5f9"/>
  <!-- Nose -->
  <ellipse cx="40" cy="44" rx="4" ry="3" fill="#1e293b"/>
  <!-- Squinty happy eyes -->
  <path d="M28 36 Q32 32 36 36" fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M44 36 Q48 32 52 36" fill="none" stroke="#1e293b" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Famous Sammy smile -->
  <path d="M30 50 Q40 58 50 50" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="40" cy="54" rx="5" ry="4" fill="#fb7185"/>
</svg>