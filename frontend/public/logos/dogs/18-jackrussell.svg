<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Jack Russell — small, high energy, half-folded ears -->
  <circle cx="40" cy="42" r="26" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Brown patch over eye -->
  <circle cx="30" cy="34" r="12" fill="#92400e"/>
  <!-- Folded ears -->
  <ellipse cx="16" cy="28" rx="10" ry="12" fill="#92400e" transform="rotate(20 16 28)"/>
  <ellipse cx="64" cy="28" rx="10" ry="12" fill="white" transform="rotate(-20 64 28)"/>
  <path d="M60 20 Q64 18 68 22" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  <!-- Muzzle -->
  <ellipse cx="40" cy="50" rx="12" ry="8" fill="#fef3c7"/>
  <ellipse cx="40" cy="46" rx="4" ry="3" fill="#292524"/>
  <!-- Eyes — alert and wired -->
  <circle cx="30" cy="36" r="4" fill="white"/>
  <circle cx="50" cy="36" r="4" fill="white"/>
  <circle cx="32" cy="36.5" r="2.5" fill="#292524"/>
  <circle cx="52" cy="36.5" r="2.5" fill="#292524"/>
  <circle cx="33" cy="35.5" r="1" fill="white"/>
  <circle cx="53" cy="35.5" r="1" fill="white"/>
  <!-- Excited grin -->
  <path d="M34 54 Q40 60 46 54" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="40" cy="58" rx="3" ry="3.5" fill="#fb7185"/>
</svg>