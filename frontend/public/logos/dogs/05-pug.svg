<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Pug — very round, huge eyes, flat nose, wrinkles -->
  <circle cx="40" cy="42" r="30" fill="#d4a574"/>
  <!-- Dark mask -->
  <ellipse cx="40" cy="44" rx="20" ry="18" fill="#78350f" opacity="0.3"/>
  <!-- Floppy ears -->
  <ellipse cx="14" cy="32" rx="8" ry="12" fill="#a16207" transform="rotate(-15 14 32)"/>
  <ellipse cx="66" cy="32" rx="8" ry="12" fill="#a16207" transform="rotate(15 66 32)"/>
  <!-- Huge eyes -->
  <circle cx="30" cy="38" r="7" fill="white"/>
  <circle cx="50" cy="38" r="7" fill="white"/>
  <circle cx="32" cy="39" r="4.5" fill="#292524"/>
  <circle cx="52" cy="39" r="4.5" fill="#292524"/>
  <circle cx="33.5" cy="37.5" r="2" fill="white"/>
  <circle cx="53.5" cy="37.5" r="2" fill="white"/>
  <!-- Flat nose -->
  <ellipse cx="40" cy="49" rx="6" ry="4" fill="#292524"/>
  <!-- Mouth -->
  <path d="M34 56 Q40 60 46 56" fill="none" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tongue -->
  <ellipse cx="40" cy="60" rx="3.5" ry="4" fill="#fb7185"/>
  <!-- Wrinkle -->
  <path d="M30 30 Q40 28 50 30" fill="none" stroke="#a16207" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>