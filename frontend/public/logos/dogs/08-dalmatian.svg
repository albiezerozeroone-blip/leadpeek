<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dalmatian — white with black spots, floppy ears -->
  <circle cx="40" cy="42" r="28" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <ellipse cx="14" cy="38" rx="9" ry="15" fill="#1e293b" transform="rotate(-8 14 38)"/>
  <ellipse cx="66" cy="38" rx="9" ry="15" fill="#1e293b" transform="rotate(8 66 38)"/>
  <!-- Spots -->
  <circle cx="26" cy="28" r="5" fill="#1e293b"/>
  <circle cx="52" cy="52" r="4" fill="#1e293b"/>
  <circle cx="54" cy="28" r="3.5" fill="#1e293b"/>
  <circle cx="32" cy="56" r="3" fill="#1e293b"/>
  <!-- Muzzle -->
  <ellipse cx="40" cy="48" rx="12" ry="8" fill="#fef3c7"/>
  <ellipse cx="40" cy="44" rx="4.5" ry="3" fill="#292524"/>
  <!-- Eyes -->
  <circle cx="30" cy="36" r="3.5" fill="#292524"/>
  <circle cx="50" cy="36" r="3.5" fill="#292524"/>
  <circle cx="31" cy="35" r="1.3" fill="white"/>
  <circle cx="51" cy="35" r="1.3" fill="white"/>
  <path d="M36 52 Q40 56 44 52" fill="none" stroke="#78350f" stroke-width="1.3" stroke-linecap="round"/>
</svg>