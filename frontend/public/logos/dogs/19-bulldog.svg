<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- English Bulldog — wide, underbite, wrinkly -->
  <ellipse cx="40" cy="44" rx="30" ry="26" fill="#d4a574"/>
  <!-- Small rose ears -->
  <ellipse cx="14" cy="28" rx="8" ry="8" fill="#b08968" transform="rotate(-10 14 28)"/>
  <ellipse cx="66" cy="28" rx="8" ry="8" fill="#b08968" transform="rotate(10 66 28)"/>
  <!-- Wrinkle lines -->
  <path d="M26 30 Q40 26 54 30" fill="none" stroke="#a16207" stroke-width="1" opacity="0.35"/>
  <path d="M28 34 Q40 31 52 34" fill="none" stroke="#a16207" stroke-width="1" opacity="0.25"/>
  <!-- Wide jowls -->
  <ellipse cx="26" cy="52" rx="12" ry="10" fill="#e8c9a0"/>
  <ellipse cx="54" cy="52" rx="12" ry="10" fill="#e8c9a0"/>
  <!-- Nose -->
  <ellipse cx="40" cy="46" rx="6" ry="4" fill="#292524"/>
  <!-- Eyes -->
  <circle cx="28" cy="38" r="4.5" fill="white"/>
  <circle cx="52" cy="38" r="4.5" fill="white"/>
  <circle cx="29.5" cy="38.5" r="2.8" fill="#292524"/>
  <circle cx="53.5" cy="38.5" r="2.8" fill="#292524"/>
  <circle cx="30.5" cy="37.5" r="1.1" fill="white"/>
  <circle cx="54.5" cy="37.5" r="1.1" fill="white"/>
  <!-- Underbite -->
  <path d="M32 56 Q40 62 48 56" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
  <rect x="36" y="56" width="8" height="4" rx="2" fill="white"/>
</svg>