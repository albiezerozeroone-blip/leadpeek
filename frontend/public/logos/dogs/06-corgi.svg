<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Corgi — big bat ears, wide face, happy -->
  <ellipse cx="40" cy="46" rx="28" ry="26" fill="#f59e0b"/>
  <!-- Huge pointy ears -->
  <polygon points="10,38 18,4 30,32" fill="#f59e0b"/>
  <polygon points="70,38 62,4 50,32" fill="#f59e0b"/>
  <polygon points="14,34 18,10 27,30" fill="#fcd34d" opacity="0.5"/>
  <polygon points="66,34 62,10 53,30" fill="#fcd34d" opacity="0.5"/>
  <!-- White belly/chest mark on face -->
  <path d="M28 42 Q40 36 52 42 L50 64 Q40 70 30 64 Z" fill="white"/>
  <!-- Nose -->
  <ellipse cx="40" cy="48" rx="4" ry="3" fill="#292524"/>
  <!-- Eyes -->
  <circle cx="30" cy="38" r="3.5" fill="#292524"/>
  <circle cx="50" cy="38" r="3.5" fill="#292524"/>
  <circle cx="31.2" cy="37" r="1.3" fill="white"/>
  <circle cx="51.2" cy="37" r="1.3" fill="white"/>
  <!-- Big grin -->
  <path d="M32 54 Q40 62 48 54" fill="none" stroke="#92400e" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="40" cy="58" rx="4" ry="4.5" fill="#fb7185"/>
</svg>