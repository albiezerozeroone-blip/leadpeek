<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Bloodhound — droopy everything, the ultimate snooper -->
  <circle cx="40" cy="40" r="28" fill="#b45309"/>
  <!-- Very long droopy ears -->
  <ellipse cx="10" cy="46" rx="10" ry="22" fill="#92400e" transform="rotate(-5 10 46)"/>
  <ellipse cx="70" cy="46" rx="10" ry="22" fill="#92400e" transform="rotate(5 70 46)"/>
  <!-- Droopy jowls -->
  <ellipse cx="28" cy="52" rx="10" ry="8" fill="#d4a574"/>
  <ellipse cx="52" cy="52" rx="10" ry="8" fill="#d4a574"/>
  <!-- Muzzle -->
  <ellipse cx="40" cy="48" rx="12" ry="9" fill="#d4a574"/>
  <ellipse cx="40" cy="44" rx="5" ry="3.5" fill="#292524"/>
  <!-- Droopy sad-cute eyes -->
  <circle cx="30" cy="34" r="4.5" fill="white"/>
  <circle cx="50" cy="34" r="4.5" fill="white"/>
  <circle cx="31" cy="35" r="2.8" fill="#292524"/>
  <circle cx="51" cy="35" r="2.8" fill="#292524"/>
  <circle cx="32" cy="34" r="1.1" fill="white"/>
  <circle cx="52" cy="34" r="1.1" fill="white"/>
  <!-- Droopy eyelids -->
  <path d="M25 32 Q30 29 35 32" fill="#b45309" stroke="none"/>
  <path d="M45 32 Q50 29 55 32" fill="#b45309" stroke="none"/>
  <path d="M36 52 Q40 56 44 52" fill="none" stroke="#78350f" stroke-width="1.3" stroke-linecap="round"/>
</svg>