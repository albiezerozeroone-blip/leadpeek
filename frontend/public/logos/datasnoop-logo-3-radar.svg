<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad3a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Radar circles -->
  <circle cx="48" cy="52" r="36" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.15"/>
  <circle cx="48" cy="52" r="26" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.25"/>
  <circle cx="48" cy="52" r="16" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.35"/>
  <circle cx="48" cy="52" r="6" fill="url(#grad3a)" opacity="0.5"/>

  <!-- Crosshair lines -->
  <line x1="48" y1="16" x2="48" y2="88" stroke="#7c3aed" stroke-width="0.7" opacity="0.2"/>
  <line x1="12" y1="52" x2="84" y2="52" stroke="#7c3aed" stroke-width="0.7" opacity="0.2"/>

  <!-- Radar sweep -->
  <path d="M48,52 L48,16 A36,36 0 0,1 79,34 Z" fill="url(#grad3sweep)" opacity="0.5"/>

  <!-- Sweep line -->
  <line x1="48" y1="52" x2="79" y2="34" stroke="url(#grad3a)" stroke-width="2" stroke-linecap="round"/>

  <!-- Detected blips -->
  <circle cx="58" cy="38" r="3" fill="#7c3aed" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="62" r="2.5" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="66" cy="56" r="2" fill="#7c3aed" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="36" r="2" fill="#a78bfa" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.1;0.45" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Center dot -->
  <circle cx="48" cy="52" r="2.5" fill="#7c3aed"/>

  <!-- Wordmark -->
  <text x="100" y="72" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1" fill="#1e293b">
    data<tspan fill="url(#grad3a)">snoop</tspan>
  </text>

  <!-- Tagline -->
  <text x="102" y="92" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="3" fill="#94a3b8">
    BELGIAN COMPANY INTELLIGENCE
  </text>
</svg>