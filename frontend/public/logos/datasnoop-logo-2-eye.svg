<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Eye shape - outer -->
  <path d="M10,52 Q48,14 86,52 Q48,90 10,52 Z" fill="none" stroke="url(#grad2a)" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Iris -->
  <circle cx="48" cy="52" r="16" fill="url(#grad2a)" opacity="0.15"/>
  <circle cx="48" cy="52" r="16" fill="none" stroke="url(#grad2a)" stroke-width="2.5"/>

  <!-- Pupil with data node pattern -->
  <circle cx="48" cy="52" r="7" fill="url(#grad2a)"/>

  <!-- Network nodes around the iris -->
  <circle cx="35" cy="40" r="2" fill="#14b8a6"/>
  <circle cx="61" cy="40" r="2" fill="#0f766e"/>
  <circle cx="35" cy="64" r="2" fill="#0f766e"/>
  <circle cx="61" cy="64" r="2" fill="#14b8a6"/>

  <!-- Connection lines between nodes -->
  <line x1="35" y1="40" x2="61" y2="40" stroke="#14b8a6" stroke-width="0.8" opacity="0.4"/>
  <line x1="35" y1="64" x2="61" y2="64" stroke="#14b8a6" stroke-width="0.8" opacity="0.4"/>
  <line x1="35" y1="40" x2="35" y2="64" stroke="#0f766e" stroke-width="0.8" opacity="0.4"/>
  <line x1="61" y1="40" x2="61" y2="64" stroke="#0f766e" stroke-width="0.8" opacity="0.4"/>
  <line x1="35" y1="40" x2="61" y2="64" stroke="#14b8a6" stroke-width="0.6" opacity="0.25"/>
  <line x1="61" y1="40" x2="35" y2="64" stroke="#14b8a6" stroke-width="0.6" opacity="0.25"/>

  <!-- Highlight on pupil -->
  <circle cx="44" cy="48" r="2.5" fill="white" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="100" y="72" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1" fill="#1e293b">
    data<tspan fill="url(#grad2a)">snoop</tspan>
  </text>

  <!-- Tagline -->
  <text x="102" y="92" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" letter-spacing="3" fill="#94a3b8">
    BELGIAN COMPANY INTELLIGENCE
  </text>
</svg>