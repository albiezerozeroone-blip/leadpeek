<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" width="420" height="110">
  <defs>
    <linearGradient id="dc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="dc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Magnifying glass -->
  <line x1="72" y1="72" x2="88" y2="90" stroke="#99f6e4" stroke-width="6.5" stroke-linecap="round"/>
  <circle cx="56" cy="56" r="24" fill="#f0fdfa" stroke="#0d9488" stroke-width="4.5"/>
  <path d="M43 46 Q47 40 54 43" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Ear left -->
  <ellipse cx="24" cy="34" rx="7" ry="14" fill="#0f766e" transform="rotate(-10 24 34)"/>

  <!-- Head -->
  <circle cx="40" cy="26" r="21" fill="url(#dc1)"/>

  <!-- Ear right -->
  <ellipse cx="58" cy="28" rx="7" ry="13" fill="#0d9488" transform="rotate(15 58 28)"/>

  <!-- Snout -->
  <ellipse cx="56" cy="34" rx="11" ry="7.5" fill="#99f6e4"/>

  <!-- Nose -->
  <ellipse cx="65" cy="32" rx="4.5" ry="3.5" fill="#134e4a"/>
  <ellipse cx="63.5" cy="30.8" rx="1.8" ry="1" fill="#fff" opacity="0.3"/>

  <!-- Left eye — open -->
  <circle cx="34" cy="22" r="5.5" fill="white"/>
  <circle cx="36.5" cy="22" r="3.2" fill="#134e4a"/>
  <circle cx="37.5" cy="21" r="1.3" fill="white"/>

  <!-- Right eye — winking -->
  <path d="M47 21 Q51.5 17 56 21" fill="none" stroke="#134e4a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Eyebrow -->
  <path d="M28.5 15.5 Q34 12 39.5 15" fill="none" stroke="#115e59" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Smirk -->
  <path d="M54 38.5 Q59 42 65 37.5" fill="none" stroke="#115e59" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Paw on glass -->
  <ellipse cx="38" cy="48" rx="7" ry="4.5" fill="#5eead4"/>
  <circle cx="33.5" cy="46.5" r="2.2" fill="#2dd4bf"/>
  <circle cx="37" cy="45.5" r="2.2" fill="#2dd4bf"/>
  <circle cx="40.5" cy="46.5" r="2.2" fill="#2dd4bf"/>

  <!-- Wordmark -->
  <text x="108" y="52" font-family="'Baloo 2', 'Nunito', 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5" fill="#1e293b">
    data<tspan fill="url(#dc2)">snoop</tspan>
  </text>
  <text x="110" y="74" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" letter-spacing="2.5" fill="#94a3b8">
    BELGIAN COMPANY INTELLIGENCE
  </text>
</svg>