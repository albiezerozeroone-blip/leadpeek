services:
  backend:
    build: ./backend
    restart: always
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "https://fpsyraglybfazambxuqb.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_3YxkBjOGg-53LjKK_r3MMA__KvGnix6"
    restart: always
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
