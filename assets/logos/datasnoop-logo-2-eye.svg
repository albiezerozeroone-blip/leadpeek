<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="g2a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Hat - detective fedora, tilted playfully -->
  <ellipse cx="48" cy="24" rx="34" ry="6" fill="#4c1d95"/>
  <path d="M18 24 Q22 6 48 4 Q74 6 78 24 Z" fill="#6d28d9"/>
  <!-- Hat band -->
  <rect x="22" y="20" width="52" height="4" rx="2" fill="#a855f7"/>
  <!-- Hat brim tilt accent -->
  <ellipse cx="78" cy="24" rx="6" ry="4" fill="#4c1d95"/>

  <!-- Face - round and friendly -->
  <circle cx="48" cy="50" r="26" fill="#fde68a"/>

  <!-- Blush cheeks -->
  <circle cx="30" cy="56" r="5" fill="#fca5a5" opacity="0.45"/>
  <circle cx="66" cy="56" r="5" fill="#fca5a5" opacity="0.45"/>

  <!-- Eyes - one open, one winking -->
  <!-- Left eye: open and looking sideways (snooping) -->
  <circle cx="38" cy="46" r="7" fill="white"/>
  <circle cx="41" cy="46" r="4" fill="url(#g2a)"/>
  <circle cx="41" cy="46" r="2" fill="#1e293b"/>
  <circle cx="42" cy="45" r="1" fill="white"/>

  <!-- Right eye: winking! -->
  <path d="M53 46 Q58 42 63 46" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyebrow left -->
  <path d="M31 38 Q38 33 45 37" fill="none" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Eyebrow right - raised (cheeky) -->
  <path d="M51 35 Q58 30 65 36" fill="none" stroke="#92400e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Smirk - knowing grin -->
  <path d="M38 58 Q48 66 60 57" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>

  <!-- Monocle on chain from hat -->
  <circle cx="80" cy="52" r="10" fill="none" stroke="#a855f7" stroke-width="2"/>
  <circle cx="80" cy="52" r="7" fill="#ede9fe" opacity="0.35"/>
  <!-- Lens glint -->
  <path d="M76 48 L78 50" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Chain -->
  <path d="M72 44 Q74 36 60 26" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>

  <!-- Collar / bow tie -->
  <polygon points="42,74 48,70 54,74 48,78" fill="url(#g2a)"/>
  <circle cx="48" cy="74" r="2.5" fill="#fde68a"/>

  <!-- Wordmark -->
  <text x="112" y="56" font-family="'Baloo 2', 'Nunito', 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5" fill="#1e293b">
    data<tspan fill="url(#g2b)">snoop</tspan>
  </text>

  <!-- Tagline -->
  <text x="114" y="78" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" letter-spacing="2.5" fill="#94a3b8">
    BELGIAN COMPANY INTELLIGENCE
  </text>
</svg>